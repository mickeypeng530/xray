  <script>
  (function () {
    'use strict';

    // ===== 分類定義 =====
    const CATEGORIES = [
      { id: 'head-neck',        name_zh: '頭、頸部擺位',    name_en: 'Head & Neck' },
      { id: 'chest-shoulder',   name_zh: '胸部、肩部擺位',  name_en: 'Chest & Shoulder' },
      { id: 'spine',            name_zh: '脊椎擺位',        name_en: 'Spine' },
      { id: 'abdomen-pelvis',   name_zh: '腹部、骨盆腔擺位', name_en: 'Abdomen & Pelvis' },
      { id: 'upper-extremity',  name_zh: '上肢擺位',        name_en: 'Upper Extremity' },
      { id: 'lower-extremity',  name_zh: '下肢擺位',        name_en: 'Lower Extremity' }
    ];

    const LS_KEYS = {
      FAVORITES: 'radpos.favorites',
      RECENT: 'radpos.recent',
      THEME: 'radpos.theme'
    };

    // ===== 資料層(Phase 1:只讀 seed;Phase 2 會加 localStorage 寫入)=====
    const dataStore = {
      _cache: null,

      async init() {
        const el = document.getElementById('seed-data');
        try {
          this._cache = JSON.parse(el.textContent);
        } catch (e) {
          console.error('seed-data 解析失敗', e);
          this._cache = [];
        }
      },

      async getAll() {
        return (this._cache || []).filter(p => p.status !== 'draft');
      },

      async getById(id) {
        return (this._cache || []).find(p => p.id === id) || null;
      },

      async getByCategory(categoryId) {
        return (await this.getAll()).filter(p => p.category === categoryId);
      },

      async search(keyword) {
        const k = keyword.trim().toLowerCase();
        if (!k) return this.getAll();
        const all = await this.getAll();
        return all.filter(p => {
          const hay = [
            p.name_zh, p.name_en, p.body_part,
            ...(p.tags || [])
          ].join(' ').toLowerCase();
          return hay.includes(k);
        });
      },

      async getRelated(position) {
        if (!position) return [];
        const all = await this.getAll();
        // 同 body_part 優先,其次同分類
        const same = all.filter(p => p.id !== position.id && p.body_part === position.body_part);
        if (same.length >= 3) return same.slice(0, 4);
        const cat = all.filter(p => p.id !== position.id && p.category === position.category && p.body_part !== position.body_part);
        return [...same, ...cat].slice(0, 4);
      }
    };

    // ===== 偏好(我的最愛、最近瀏覽、深色模式)=====
    const prefs = {
      getFavorites() {
        try { return JSON.parse(localStorage.getItem(LS_KEYS.FAVORITES) || '[]'); }
        catch { return []; }
      },
      isFavorite(id) { return this.getFavorites().includes(id); },
      toggleFavorite(id) {
        const favs = this.getFavorites();
        const i = favs.indexOf(id);
        if (i >= 0) { favs.splice(i, 1); toast('已從我的最愛移除'); }
        else { favs.push(id); toast('已加入我的最愛'); }
        localStorage.setItem(LS_KEYS.FAVORITES, JSON.stringify(favs));
      },

      getRecent() {
        try { return JSON.parse(localStorage.getItem(LS_KEYS.RECENT) || '[]'); }
        catch { return []; }
      },
      pushRecent(id) {
        const list = this.getRecent().filter(x => x !== id);
        list.unshift(id);
        localStorage.setItem(LS_KEYS.RECENT, JSON.stringify(list.slice(0, 10)));
      },

      getTheme() {
        const saved = localStorage.getItem(LS_KEYS.THEME);
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      },
      setTheme(t) {
        localStorage.setItem(LS_KEYS.THEME, t);
        applyTheme(t);
      },
      toggleTheme() {
        this.setTheme(this.getTheme() === 'dark' ? 'light' : 'dark');
      }
    };

    function applyTheme(t) {
      document.documentElement.classList.toggle('dark', t === 'dark');
    }

    // ===== Toast =====
    function toast(msg) {
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = 'toast bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm pointer-events-auto';
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => el.remove(), 2800);
    }

    // ===== 路由(hash-based)=====
    const router = {
      init() {
        window.addEventListener('hashchange', () => this.handle());
        this.handle();
      },
      go(path) { location.hash = path; },
      handle() {
        const hash = location.hash || '#/';
        const m = hash.match(/^#\/?(.*)$/);
        const path = m ? m[1] : '';

        if (!path) return render(viewList());
        if (path === 'favorites') return render(viewFavorites());
        if (path === 'recent') return render(viewRecent());

        const mCat = path.match(/^category\/(.+)$/);
        if (mCat) return render(viewCategory(mCat[1]));

        const mPos = path.match(/^position\/(.+)$/);
        if (mPos) return render(viewDetail(mPos[1]));

        render(viewList());
      }
    };

    async function render(promise) {
      const app = document.getElementById('app');
      app.innerHTML = `<div class="flex items-center justify-center h-96 text-slate-400">載入中...</div>`;
      try {
        const html = await promise;
        app.innerHTML = html;
        window.scrollTo(0, 0);
        // 呼叫該 view 的 post-render hook
        if (typeof postRender === 'function') postRender();
      } catch (e) {
        console.error(e);
        app.innerHTML = `<div class="flex items-center justify-center h-96 text-red-500">載入失敗:${e.message}</div>`;
      }
    }

    // ===== 共用元件 =====
    function headerHtml(searchValue = '') {
      const isDark = document.documentElement.classList.contains('dark');
      return `
        <header class="no-print bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-30">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center gap-3">
            <a href="#/" class="flex items-center gap-2 shrink-0" aria-label="回首頁">
              <div class="w-8 h-8 rounded-lg bg-brand-600 text-white flex items-center justify-center font-bold">放</div>
              <div class="hidden sm:block">
                <div class="text-sm font-bold text-slate-900 dark:text-white leading-tight">放射擺位</div>
                <div class="text-xs text-slate-500 dark:text-slate-400 leading-tight">亞東影像醫學科</div>
              </div>
            </a>

            <div class="flex-1 relative" id="search-wrap">
              <input type="search" id="search-input" value="${escapeHtml(searchValue)}"
                     placeholder="搜尋擺位名稱、部位、tag(中英文皆可)..."
                     autocomplete="off" role="combobox" aria-autocomplete="list"
                     aria-expanded="false" aria-controls="search-dropdown"
                     class="w-full pl-10 pr-10 py-2 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                     aria-label="搜尋">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M10 18a8 8 0 110-16 8 8 0 010 16z"/>
              </svg>
              <button id="search-clear" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 ${searchValue ? '' : 'hidden'}" aria-label="清除搜尋">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
              <div id="search-dropdown" role="listbox" hidden
                   class="absolute left-0 right-0 top-full mt-1 max-h-[70vh] overflow-y-auto rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-xl z-40">
              </div>
            </div>

            <button id="theme-toggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300"
                    aria-label="切換深色模式">
              ${isDark
                ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>`
                : `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>`
              }
            </button>
          </div>
        </header>
      `;
    }

    function sidebarHtml(activeCategory = '') {
      const favCount = prefs.getFavorites().length;
      const recentCount = prefs.getRecent().length;
      return `
        <aside class="no-print lg:w-60 lg:shrink-0">
          <nav class="lg:sticky lg:top-20 space-y-1">
            <a href="#/" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm ${!activeCategory ? 'bg-brand-50 dark:bg-brand-700/30 text-brand-700 dark:text-brand-100 font-medium' : 'text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'}">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
              全部擺位
            </a>
            ${CATEGORIES.map(c => `
              <a href="#/category/${c.id}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm ${activeCategory === c.id ? 'bg-brand-50 dark:bg-brand-700/30 text-brand-700 dark:text-brand-100 font-medium' : 'text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'}">
                <span class="w-1.5 h-1.5 rounded-full bg-brand-500"></span>
                ${c.name_zh}
              </a>
            `).join('')}

            <div class="pt-4 mt-4 border-t border-slate-200 dark:border-slate-700 space-y-1">
              <a href="#/favorites" class="flex items-center justify-between px-3 py-2 rounded-lg text-sm ${activeCategory === '__favorites' ? 'bg-brand-50 dark:bg-brand-700/30 text-brand-700 dark:text-brand-100 font-medium' : 'text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'}">
                <span class="flex items-center gap-2">

      const hasPhoto = p.images && p.images.positioning_photo;

      const isPending = p.notes && /範例|待補/.test(p.notes);

      return `
        <a href="#/position/${p.id}" class="card-fade group relative block bg-white dark:bg-slate-800 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 hover:shadow-xl hover:border-brand-400 dark:hover:border-brand-500 hover:-translate-y-1 transition-all duration-200">

            ${thumb
              ? `<img src="${escapeHtml(hasXray || hasPhoto)}" alt="${escapeHtml(p.name_en)}" class="w-full h-full object-contain group-hover:scale-105 group-hover:opacity-75 transition duration-300">`

                <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.196-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.783-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>

      const positions = await dataStore.getAll();
      return listLayout('放射擺位', 'RADIOGRAPHIC POSITIONING', '', positions);
    }

      const cat = CATEGORIES.find(c => c.id === catId);
      if (!cat) return viewList();
      const positions = await dataStore.getByCategory(catId);
      return listLayout(cat.name_zh, cat.name_en, catId, positions);

      const favIds = prefs.getFavorites();
      const all = await dataStore.getAll();
      const positions = favIds.map(id => all.find(p => p.id === id)).filter(Boolean);
      return listLayout('我的最愛', 'MY FAVORITES', '__favorites', positions, '還沒有收藏任何擺位。點進詳情頁,按右上角星號即可收藏。');

      const recentIds = prefs.getRecent();
      const all = await dataStore.getAll();
      const positions = recentIds.map(id => all.find(p => p.id === id)).filter(Boolean);
      return listLayout('最近瀏覽', 'RECENTLY VIEWED', '__recent', positions, '還沒有瀏覽紀錄。');

                  <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.196-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.783-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>

                <span class="hidden sm:inline">列印</span>

              <h1 class="text-3xl font-bold text-slate-900 dark:text-white">${escapeHtml(p.body_part)}</h1>

            <!-- Evaluation Criteria -->
            ${p.evaluation_criteria && p.evaluation_criteria.length ? `

                <ol class="mt-2 space-y-2 text-slate-700 dark:text-slate-200 list-decimal list-outside pl-6 leading-relaxed">

            <!-- Tips -->
            ${p.tips && p.tips.length ? `
              <section class="mt-6 p-4 rounded-lg bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700/50">
                <h2 class="text-sm font-bold text-amber-700 dark:text-amber-400 uppercase tracking-wider">Tips <span class="text-amber-500/70 font-normal">提示 — 若病人無法配合時</span></h2>
                <ol class="mt-2 space-y-1 text-amber-900 dark:text-amber-100 list-decimal list-outside pl-6 text-sm leading-relaxed">

            <!-- Notes -->

          <!-- 相關擺位 -->
          ${related.length ? `
            <section class="no-print mt-8">
              <h3 class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3">相關擺位</h3>
              <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4">

          <!-- 上一筆 / 下一筆 -->
          <nav class="no-print mt-8 flex items-stretch gap-3">
            ${prev ? `

                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>

    function imageBlock(src, labelZh, labelEn) {
      if (src) {
        return `

                 class="w-full aspect-square object-contain cursor-zoom-in lightbox-trigger"
                 data-src="${escapeHtml(src)}">
            <figcaption class="text-center text-xs text-slate-500 py-2 bg-white dark:bg-slate-800">${escapeHtml(labelZh)}</figcaption>
          </figure>
        `;
      }
      return `
        <div class="rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700">
          <div class="aspect-square img-placeholder flex items-center justify-center text-slate-500 text-sm">(圖片待補)</div>
          <div class="text-center text-xs text-slate-500 py-2 bg-white dark:bg-slate-800">${escapeHtml(labelZh)}</div>
        </div>
      `;
    }

    // ===== Post-render(綁定事件) =====
    // ===== Typeahead 搜尋(下拉建議,任何頁可用) =====
    let _searchActiveIdx = -1;
    let _searchResults = [];

    function bindSearch() {
      const input = document.getElementById('search-input');
      const dropdown = document.getElementById('search-dropdown');
      const clearBtn = document.getElementById('search-clear');
      const wrap = document.getElementById('search-wrap');
      if (!input || !dropdown) return;

      const updateDropdown = debounce(async () => {
        const kw = input.value.trim();
        clearBtn.classList.toggle('hidden', !kw);

        // 列表頁:同時即時過濾下方卡片(若存在)
        const grid = document.getElementById('card-grid');
        if (grid) {
          const all = await dataStore.search(kw);
          grid.innerHTML = all.length
            ? all.map(cardHtml).join('')
            : emptyStateHtml('沒有符合搜尋條件的擺位。');
        }

        if (!kw) {
          closeDropdown();
          return;
        }
        _searchResults = (await dataStore.search(kw)).slice(0, 8);
        _searchActiveIdx = _searchResults.length ? 0 : -1;
        renderDropdown(kw);
      }, 100);

      function renderDropdown(kw) {
        if (!_searchResults.length) {
          dropdown.innerHTML = `<div class="px-4 py-3 text-sm text-slate-400">找不到符合「${escapeHtml(kw)}」的擺位</div>`;
          openDropdown();
          return;
        }
        dropdown.innerHTML = _searchResults.map((p, i) => {
          const cat = CATEGORIES.find(c => c.id === p.category);
          const catName = cat ? cat.name_zh.replace('擺位', '') : '';
          const thumb = (p.images && (p.images.xray_sample || p.images.positioning_photo)) || '';
          const active = i === _searchActiveIdx;
          return `
            <a href="#/position/${p.id}" data-idx="${i}"
               class="search-item flex items-center gap-3 px-3 py-2 border-b border-slate-100 dark:border-slate-700/50 last:border-0
                      ${active ? 'bg-brand-50 dark:bg-brand-700/30' : 'hover:bg-slate-50 dark:hover:bg-slate-700/40'}">
              <div class="w-10 h-10 rounded shrink-0 overflow-hidden ${thumb ? 'bg-black' : 'img-placeholder'}">
                ${thumb ? `<img src="${escapeHtml(thumb)}" alt="" class="w-full h-full object-contain">` : ''}
              </div>
              <div class="min-w-0 flex-1">
                <div class="flex items-baseline gap-2">
                  <span class="text-xs font-medium text-brand-600 dark:text-brand-400">${escapeHtml(p.body_part)}</span>
                  <span class="text-sm font-semibold text-slate-900 dark:text-white truncate">${highlight(p.name_zh, kw)}</span>
                </div>
                <div class="text-xs text-slate-500 dark:text-slate-400 truncate">${highlight(p.name_en, kw)} · ${escapeHtml(catName)}</div>
              </div>
            </a>
          `;
        }).join('');
        openDropdown();

        // 滑鼠 hover 同步高亮
        dropdown.querySelectorAll('.search-item').forEach(el => {
          el.addEventListener('mouseenter', () => {
            _searchActiveIdx = parseInt(el.dataset.idx, 10);
            updateActiveStyle();
          });
        });
      }

      function updateActiveStyle() {
        dropdown.querySelectorAll('.search-item').forEach((el, i) => {
          el.classList.toggle('bg-brand-50', i === _searchActiveIdx);
          el.classList.toggle('dark:bg-brand-700/30', i === _searchActiveIdx);
        });
        const active = dropdown.querySelector(`.search-item[data-idx="${_searchActiveIdx}"]`);
        if (active) active.scrollIntoView({ block: 'nearest' });
      }

      function openDropdown() {
        dropdown.hidden = false;
        input.setAttribute('aria-expanded', 'true');
      }
      function closeDropdown() {
        dropdown.hidden = true;
        input.setAttribute('aria-expanded', 'false');
        _searchActiveIdx = -1;
        _searchResults = [];
      }

      input.addEventListener('input', updateDropdown);
      input.addEventListener('focus', () => {
        if (input.value.trim()) updateDropdown();
      });

      // 鍵盤導航
      input.addEventListener('keydown', (e) => {
        if (dropdown.hidden || !_searchResults.length) {
          if (e.key === 'Enter' && _searchResults.length === 0 && input.value.trim()) {
            // 純 enter 時也跳結果(若有的話) — 此分支為 noop fallback
          }
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          _searchActiveIdx = (_searchActiveIdx + 1) % _searchResults.length;
          updateActiveStyle();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          _searchActiveIdx = (_searchActiveIdx - 1 + _searchResults.length) % _searchResults.length;
          updateActiveStyle();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const pick = _searchResults[_searchActiveIdx] || _searchResults[0];
          if (pick) {
            closeDropdown();
            input.blur();
            router.go(`/position/${pick.id}`);
          }
        } else if (e.key === 'Escape') {
          closeDropdown();
          input.blur();
        }
      });

      // 點擊外面關閉
      document.addEventListener('click', (e) => {
        if (!wrap.contains(e.target)) closeDropdown();
      });

      // 清除按鈕
      if (clearBtn) clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.add('hidden');
        closeDropdown();
        // 同步重置卡片過濾
        const grid = document.getElementById('card-grid');
        if (grid) router.handle();
        input.focus();
      });
    }

    function highlight(text, kw) {
      if (!kw) return escapeHtml(text);
      const safe = escapeHtml(text);
      const safeKw = escapeHtml(kw).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return safe.replace(new RegExp(`(${safeKw})`, 'gi'),
        '<mark class="bg-amber-200 dark:bg-amber-500/40 text-inherit rounded px-0.5">$1</mark>');
    }

    function postRender() {
      bindSearch();

      // 深色模式
      const themeBtn = document.getElementById('theme-toggle');
      if (themeBtn) themeBtn.addEventListener('click', () => {
        prefs.toggleTheme();
        // 重新渲染以更新 icon
        router.handle();
      });

      // 我的最愛
      document.querySelectorAll('.fav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const id = btn.getAttribute('data-id');
          prefs.toggleFavorite(id);
          router.handle();
        });
      });

      // Lightbox
      document.querySelectorAll('.lightbox-trigger').forEach(img => {
        img.addEventListener('click', () => openLightbox(img.getAttribute('data-src')));
      });
      const lb = document.getElementById('lightbox');
      lb.addEventListener('click', () => { lb.hidden = true; });

      // 分享
      const shareBtn = document.getElementById('share-btn');
      if (shareBtn) shareBtn.addEventListener('click', () => {
        const url = location.href;
        navigator.clipboard.writeText(url)
          .then(() => toast('連結已複製到剪貼簿'))
          .catch(() => toast('複製失敗,請手動複製網址'));
      });

      // 列印
      const printBtn = document.getElementById('print-btn');
      if (printBtn) printBtn.addEventListener('click', () => window.print());
    }

    function openLightbox(src) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      img.src = src;
      lb.hidden = false;
    }

    // ===== Utils =====
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function debounce(fn, ms) {
      let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }

    // 鍵盤 esc 關 lightbox
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const lb = document.getElementById('lightbox');
        if (lb && !lb.hidden) lb.hidden = true;
      }
    });

    // ===== 啟動 =====
    applyTheme(prefs.getTheme());
    dataStore.init().then(() => router.init());

    // 暴露到全域方便 debug
    window.__radpos = { dataStore, prefs, router, CATEGORIES };
  })();
  </script>
</body>
</html>
